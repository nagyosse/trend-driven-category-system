services:
  db:
    image: postgres:15
    container_name: trend_db
    restart: always
    environment:
      POSTGRES_USER: trend_user
      POSTGRES_PASSWORD: trend_password
      POSTGRES_DB: trend_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: trend_api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
